name: CICD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Tjek kode ud
        uses: actions/checkout@v4

      - name: Scan for hemmeligheder i koden
        run: |
          echo "Scanner for passwords og hemmeligheder..."
          if grep -rn "password\s*=\s*['\"][^'\"]" --include="*.py" .; then
            echo "ADVARSEL: Muligt hardcodet password fundet i koden!"
            exit 1
          fi
          if [ -f ".env.local" ] || [ -f ".env.remote" ]; then
            echo "ADVARSEL: .env fil fundet i repo - må ikke commites!"
            exit 1
          fi
          echo "Ingen hemmeligheder fundet - koden er sikker!"

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tjek at koden kan kompilere
        run: |
          python -m compileall .

      - name: Kør pytest
        run: |
          pytest

  build-and-push-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Tjek kode ud
        uses: actions/checkout@v4

      - name: Log ind på GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Byg og push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: tags: ghcr.io/jonasiwanouw/intelligent-iot-flask-api:latest